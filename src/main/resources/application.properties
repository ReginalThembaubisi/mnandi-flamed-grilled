# Server Configuration
server.port=${PORT:8080}

# H2 Database Configuration
# Database Configuration (Env Vars override defaults for Local H2)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:file:./data/mnandi}
# spring.datasource.driverClassName=org.h2.Driver <-- Let Spring Boot auto-detect based on URL
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Google Sheets CSV URLs
# To get these URLs:
# 1. Open your Google Sheet
# 2. Go to File -> Share -> Publish to web
# 3. Select the specific sheet (Menu or Sides)
# 4. Choose "Comma-separated values (.csv)"
# 5. Click Publish and copy the URL
google.sheets.menu.url=https://docs.google.com/spreadsheets/d/1rvnGU03smI5MUF8VAPkrejK_6z5YRDYFoWLRCfbrTd4/gviz/tq?tqx=out:csv&sheet=Menu
google.sheets.sides.url=https://docs.google.com/spreadsheets/d/1rvnGU03smI5MUF8VAPkrejK_6z5YRDYFoWLRCfbrTd4/gviz/tq?tqx=out:csv&sheet=Sides
google.sheets.business.url=https://docs.google.com/spreadsheets/d/1rvnGU03smI5MUF8VAPkrejK_6z5YRDYFoWLRCfbrTd4/gviz/tq?tqx=out:csv&sheet=BusinessHours

# Logging
logging.level.com.mnandi=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# Admin Initial Password
mnandi.admin.initial-password=${MNANDI_ADMIN_INITIAL_PASSWORD:mnandi2024}
