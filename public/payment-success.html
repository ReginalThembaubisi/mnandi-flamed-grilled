<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful - Mnandi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7ed;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .ok {
      font-size: 56px;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0 0 10px;
      color: #ea580c;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      margin-top: 6px;
      background: #f97316;
      color: #fff;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ok">✅</div>
    <h1>Payment Received</h1>
    <p>Your payment was successful. Your order is now being prepared.</p>
    <p>You can return to the menu to place another order.</p>
    <a href="/menu">Back to Menu</a>
  </div>
</body>
</html>
