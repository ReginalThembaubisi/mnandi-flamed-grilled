<!DOCTYPE html>
<html>

<head>
    <title>Google Sheets Diagnostics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            color: #333;
        }

        pre {
            background: #f8f8f8;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .btn {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔍 Google Sheets Column Diagnostics</h1>
        <p>This page will show the EXACT column names from your Google Sheets</p>

        <button class="btn" onclick="checkMenuSheet()">Check Menu Sheet</button>
        <button class="btn" onclick="checkSidesSheet()">Check Sides Sheet</button>

        <h2>Raw CSV Data:</h2>
        <pre id="output"></pre>
    </div>

    <script>
        const MENU_URL = 'https://docs.google.com/spreadsheets/d/1rvnGU03smI5MUF8VAPkrejK_6z5YRDYFoWLRCfbrTd4/gviz/tq?tqx=out:csv&sheet=Menu';
        const SIDES_URL = 'https://docs.google.com/spreadsheets/d/1rvnGU03smI5MUF8VAPkrejK_6z5YRDYFoWLRCfbrTd4/gviz/tq?tqx=out:csv&sheet=Sides';

        async function checkMenuSheet() {
            document.getElementById('output').textContent = 'Loading Menu sheet...';
            try {
                const response = await fetch(MENU_URL);
                const text = await response.text();
                document.getElementById('output').textContent = '=== MENU SHEET RAW CSV ===\n\n' + text;
            } catch (error) {
                document.getElementById('output').textContent = 'Error: ' + error.message;
            }
        }

        async function checkSidesSheet() {
            document.getElementById('output').textContent = 'Loading Sides sheet...';
            try {
                const response = await fetch(SIDES_URL);
                const text = await response.text();
                document.getElementById('output').textContent = '=== SIDES SHEET RAW CSV ===\n\n' + text;
            } catch (error) {
                document.getElementById('output').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>

</html>
